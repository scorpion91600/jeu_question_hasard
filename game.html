  <style>
    /* ── Overlay plein écran ── */
    #verdict-overlay {
      position: fixed;
      inset: 0;
      background: #F5C800;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s ease;
    }
    #verdict-overlay.visible {
      opacity: 1;
      pointer-events: all;
    }

    #verdict-overlay .overlay-label {
      font-family: 'Inter', sans-serif;
      font-size: clamp(1.4rem, 5vw, 2.2rem);
      font-weight: 800;
      color: #0D0D0D;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      margin-top: 2rem;
      border: 3px solid #0D0D0D;
      padding: 0.4rem 1.4rem;
      background: #fff;
    }

    #verdict-overlay .overlay-sub {
      font-family: 'Inter', sans-serif;
      font-size: 0.95rem;
      font-weight: 600;
      color: #0D0D0D;
      margin-top: 1rem;
      opacity: 0.7;
      letter-spacing: 0.05em;
    }

    /* ── SVG hammer dans l'overlay ── */
    #overlay-hammer-wrap {
      width: min(260px, 60vw);
      height: min(260px, 60vw);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #overlay-hammer-wrap svg {
      width: 100%;
      height: 100%;
    }

    /* Marteau : groupe principal */
    #ol-hammer {
      transform-origin: 31px 38px;
      animation: ol-strike 1s ease-in-out infinite;
    }

    @keyframes ol-strike {
      0%   { transform: rotate(-50deg) translateY(-6px); }
      55%  { transform: rotate(-50deg) translateY(-6px); }
      78%  { transform: rotate(0deg)   translateY(0px);  }
      86%  { transform: rotate(4deg)   translateY(0px);  }
      93%  { transform: rotate(0deg)   translateY(0px);  }
      100% { transform: rotate(-50deg) translateY(-6px); }
    }

    #ol-impact {
      opacity: 0;
      animation: ol-flash 1s ease-in-out infinite;
    }

    @keyframes ol-flash {
      0%   { opacity: 0; }
      55%  { opacity: 0; }
      79%  { opacity: 1; }
      88%  { opacity: 0; }
      100% { opacity: 0; }
    }

    #ol-table {
      animation: ol-shake 1s ease-in-out infinite;
    }

    @keyframes ol-shake {
      0%   { transform: translateY(0); }
      79%  { transform: translateY(0); }
      81%  { transform: translateY(2.5px); }
      85%  { transform: translateY(-1px); }
      89%  { transform: translateY(0); }
      100% { transform: translateY(0); }
    }

    /* Bounce d'entrée du wrapper SVG */
    @keyframes ol-pop {
      0%   { transform: scale(0.4) rotate(-10deg); opacity: 0; }
      60%  { transform: scale(1.12) rotate(3deg);  opacity: 1; }
      80%  { transform: scale(0.95) rotate(-1deg); }
      100% { transform: scale(1) rotate(0deg);     opacity: 1; }
    }

    #verdict-overlay.visible #overlay-hammer-wrap {
      animation: ol-pop 0.5s cubic-bezier(.22,1.2,.36,1) both;
    }
  </style>
</head>

  <!-- ══ PAGE ══ -->
  <header class="header">
    <a href="index.html" class="logo">⚖ Verdict</a>
    <div id="timer" class="timer">01:30</div>
  </header>

  <main class="main">

    <div class="subject-card card">
      <div class="subject-card__meta">
        <span id="subject-category" class="category-chip">Chargement…</span>
      </div>
      <p id="subject-text" class="subject-card__text" style="color:var(--color-text-muted)">Récupération du sujet…</p>
    </div>

    <div id="camp-section" class="camp-section" style="display:none">
      <span id="camp-badge" class="camp-badge"></span>
      <span id="camp-instruction" class="camp-section__instruction"></span>
    </div>

    <div id="pregame-bar" class="pregame-bar" style="display:none">
      <button id="change-subject-btn" type="button" class="btn btn--outline">
        🔀 Autre sujet
      </button>
      <button id="start-btn" type="button" class="btn btn--accent btn--lg">
        Commencer →
      </button>
    </div>

    <form id="plea-form" class="plea-section">
      <div id="plea-section" hidden>
        <label for="plea-textarea">Ta plaidoirie</label>
        <textarea
          id="plea-textarea"
          class="plea-textarea"
          placeholder="Rédige ta plaidoirie ici… sois convaincant(e) !"
          maxlength="500"
        ></textarea>
        <div class="plea-section__footer">
          <span id="char-count" class="char-count">0 / 500</span>
          <button id="submit-btn" type="submit" class="btn btn--primary">
            Soumettre
          </button>
        </div>
      </div>
    </form>

  </main>

  <script type="module" src="js/game-page.js"></script>

  <script>
    // Inject overlay trigger — intercepte le submit AVANT game-page.js
    // On écoute en capture pour être le premier
    document.addEventListener('submit', function(e) {
      if (e.target && e.target.id === 'plea-form') {
        const overlay = document.getElementById('verdict-overlay');
        if (overlay) overlay.classList.add('visible');
      }
    }, true); // capture phase
  </script>
</body>
</html>
